# envfile = ".env"

[executor]
type = "uv"

[env]
RUN_BASE = "src/pep440check"
TRIVY_IGNORE = "--skip-dirs ./tmp,./xml"
SHELL = "bash"

[tasks]

pub1 = "python src/mqtt_learn1/pub1.py"
sub1 = "python src/mqtt_learn1/sub1.py"

client2 = "python src/mqtt_learn1/client2.py -i device1"
sub2 = "python src/mqtt_learn1/sub2.py -i device1"

# ======== MQTT server (Broker)
mqtt = "docker compose -p mqtt-learn1 -f docker/1/docker-compose.yml up -d mqtt"
logs = "docker compose -p mqtt-learn1 -f docker/1/docker-compose.yml logs -f mqtt"
down = "docker compose -p mqtt-learn1 -f docker/1/docker-compose.yml down -v mqtt"

# ======== MQTT client examples
# needs `sudo apt install mosquitto-clients`

# Broker Statuses
uptime = "mosquitto_sub -v -t '$SYS/broker/uptime' -h localhost -p 1883"
clients = "mosquitto_sub -v -t '$SYS/broker/clients/connected' -h localhost -p 1883"

# ======== lint
check = "ruff check ./src"
# mypy = "mypy src"
mypy = "pyrefly check src"
pyrefly = "pyrefly check src"
pyproject_lint = "validate-pyproject pyproject.toml"
actionlint = "actionlint"

lint = ["check", "mypy", "pyproject_lint"]
lint_full = ["lint", "actionlint"]

# audit = "uvx uv-secure --show-severity --ignore-vulns GHSA-5239-wwwm-4pmq ./uv.lock"
audit = "uvx uv-secure"

# ======== build
# clean = "rm -rf dist"
clean = "python -c \"import shutil; shutil.rmtree('dist', ignore_errors=True)\""
pack = "uv build"

# ======== utils
format_python = "ruff format"
format_others.shell = "oxfmt"
format = ["format_python", "format_others"]

update.shell = "uv lock -U && uv sync"

uvsync = "uv sync"
requirements = "uv pip compile pyproject.toml --no-deps -o requirements.txt"
sync = ["uvsync", "requirements"]

trivy-config = "trivy config ."
trivy-fs = "trivy fs ${TRIVY_IGNORE} ."
trivy-check = ["trivy-config", "trivy-fs"]
trivy = ["trivy-check"]
trivy-license = "trivy fs ${TRIVY_IGNORE} --scanners license --severity HIGH,CRITICAL ."
trivy-sbom = "trivy fs ${TRIVY_IGNORE} --scanners vuln --format cyclonedx --output sbom.cdx.json ."
trivy-sbom-spdx = "trivy fs ${TRIVY_IGNORE} --scanners vuln --format spdx-json --output sbom.spdx.json ."
sbom = ["requirements", "trivy-sbom", "trivy-sbom-spdx"]

[tasks.testpypi]
help = "Build and upload to Test PyPI"
envfile = ".env"
cmd = """uv publish \
  --publish-url https://test.pypi.org/legacy/ \
  --token $TEST_PYPI_TOKEN"""
